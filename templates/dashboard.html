{% extends "layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <h1 class="text-xl font-bold text-gray-800">Calculations Dashboard</h1>
                    </div>
                </div>
                <div class="flex items-center">
                    <span id="userWelcome" class="text-gray-700 mr-4"></span>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Error/Success Alerts -->
        <div id="errorAlert" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            <span id="errorMessage" class="block sm:inline"></span>
        </div>
        <div id="successAlert" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4">
            <span id="successMessage" class="block sm:inline"></span>
        </div>

        <!-- New Calculation Form -->
        <div class="bg-white shadow rounded-lg mb-6 p-4">
            <h2 class="text-lg font-semibold mb-4">New Calculation</h2>
            <form id="calculationForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Number A</label>
                        <input type="number" id="calcA" name="a" step="any" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Operation</label>
                        <select id="calcOperation" name="operation"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                            <option value="add">Addition (+)</option>
                            <option value="subtract">Subtraction (-)</option>
                            <option value="multiply">Multiplication (x)</option>
                            <option value="divide">Division (/)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Number B</label>
                        <input type="number" id="calcB" name="b" step="any" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    </div>
                </div>
                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                    Calculate
                </button>
            </form>
        </div>

        <!-- Calculations History -->
        <div class="bg-white shadow rounded-lg p-4">
            <h2 class="text-lg font-semibold mb-4">Calculation History</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">A</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Op</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">B</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Result</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="calculationsTable" class="bg-white divide-y divide-gray-200">
                        <!-- Calculations will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- Edit Modal -->
<div id="editModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
        <h2 class="text-lg font-semibold mb-4">Edit Calculation</h2>
        <form id="editForm" class="space-y-4">
            <input type="hidden" id="editCalcId">
            <div>
                <label for="editA" class="block text-sm font-medium text-gray-700">Number A</label>
                <input type="number" id="editA" step="any" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <div>
                <label for="editOperation" class="block text-sm font-medium text-gray-700">Operation</label>
                <select id="editOperation"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    <option value="add">Addition (+)</option>
                    <option value="subtract">Subtraction (-)</option>
                    <option value="multiply">Multiplication (x)</option>
                    <option value="divide">Division (/)</option>
                </select>
            </div>
            <div>
                <label for="editB" class="block text-sm font-medium text-gray-700">Number B</label>
                <input type="number" id="editB" step="any" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button type="button" id="cancelEdit"
                        class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300">
                    Cancel
                </button>
                <button type="submit"
                        class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Check if user is logged in
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    // Set welcome message
    const username = localStorage.getItem('username');
    document.getElementById('userWelcome').textContent = `Welcome, ${username}!`;

    // Helper functions for alerts
    function showError(message) {
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.textContent = message;
        errorAlert.classList.remove('hidden');
        setTimeout(() => errorAlert.classList.add('hidden'), 5000);
    }

    function showSuccess(message) {
        const successAlert = document.getElementById('successAlert');
        const successMessage = document.getElementById('successMessage');
        successMessage.textContent = message;
        successAlert.classList.remove('hidden');
        setTimeout(() => successAlert.classList.add('hidden'), 5000);
    }

    // Load calculations
    async function loadCalculations() {
        try {
            const response = await fetch('/calculations', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                if (response.status === 401) {
                    // Token expired or invalid
                    localStorage.clear();
                    window.location.href = '/login';
                    return;
                }
                throw new Error('Failed to load calculations');
            }

            const calculations = await response.json();
            const tableBody = document.getElementById('calculationsTable');
            tableBody.innerHTML = '';

            if (calculations.length === 0) {
                // Show a message when no calculations exist
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td colspan="6" class="px-6 py-4 text-center text-gray-500">
                        No calculations found. Create your first calculation above!
                    </td>
                `;
                tableBody.appendChild(row);
                return;
            }
            calculations.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            const OP_SYMBOLS = { add: '+', subtract: '-', multiply: 'x', divide: '/' };

            calculations.forEach(calc => {
                const row = document.createElement('tr');
                const symbol = OP_SYMBOLS[calc.operation] ?? calc.operation;
                const date = new Date(calc.timestamp).toLocaleString();
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${calc.a}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-medium">${symbol}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${calc.b}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-semibold">${parseFloat(calc.result.toFixed(8))}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-sm">${date}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <button class="text-indigo-600 hover:text-indigo-900 edit-calc mr-3"
                                data-id="${calc.id}"
                                data-a="${calc.a}"
                                data-b="${calc.b}"
                                data-operation="${calc.operation}">Edit</button>
                        <button class="text-red-600 hover:text-red-900 delete-calc" data-id="${calc.id}">Delete</button>
                    </td>

                `;
                tableBody.appendChild(row);
            });


            // Add delete event listeners
            document.querySelectorAll('.delete-calc').forEach(button => {
                button.addEventListener('click', async (e) => {
                    if (!confirm('Are you sure you want to delete this calculation?')) {
                        return;
                    }
                    
                    const calcId = e.target.dataset.id;
                    try {
                        const response = await fetch(`/calculations/${calcId}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (!response.ok) {
                            if (response.status === 401) {
                                localStorage.clear();
                                window.location.href = '/login';
                                return;
                            }
                            throw new Error('Failed to delete calculation');
                        }

                        showSuccess('Calculation deleted successfully');
                        loadCalculations();
                    } catch (error) {
                        showError('Error deleting calculation');
                    }
                });
            });
            document.querySelectorAll('.edit-calc').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.getElementById('editCalcId').value = btn.dataset.id;
                    document.getElementById('editA').value = btn.dataset.a;
                    document.getElementById('editB').value = btn.dataset.b;
                    document.getElementById('editOperation').value = btn.dataset.operation;
                    document.getElementById('editModal').classList.remove('hidden');
                });
            });
        } catch (error) {
            showError('Error loading calculations');
        }
    }

    // Handle new calculation submission
    document.getElementById('calculationForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const a = parseFloat(document.getElementById('calcA').value);
        const b = parseFloat(document.getElementById('calcB').value);
        const operation = document.getElementById('calcOperation').value;

        if (isNaN(a) || isNaN(b)) {
            showError('Please enter valid numbers for A and B');
            return;
        }
        if (operation === 'divide' && b === 0) {
            showError('Cannot divide by zero');
            return;
        }

        try {
            const response = await fetch('/calculations', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ a, b, operation })
            });

            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login';
                    return;
                }
                const err = await response.json().catch(() => ({}));
                showError(err.error ?? err.detail ?? 'Failed to create calculation');
                return;
            }

            showSuccess('Calculation created successfully');
            document.getElementById('calculationForm').reset();
            loadCalculations();
        } catch (error) {
            showError('Error creating calculation');
        }
    });

    document.getElementById('cancelEdit').addEventListener('click', () => {
        document.getElementById('editModal').classList.add('hidden');
    });

    document.getElementById('editForm').addEventListener('submit', async (e) => {
    e.preventDefault();

        const id = document.getElementById('editCalcId').value;
        const a = parseFloat(document.getElementById('editA').value);
        const b = parseFloat(document.getElementById('editB').value);
        const operation = document.getElementById('editOperation').value;

        if (isNaN(a) || isNaN(b)) {
            showError('Please enter valid numbers for A and B');
            return;
        }
        if (operation === 'divide' && b === 0) {
            showError('Cannot divide by zero');
            return;
        }

        try {
            const response = await fetch(`/calculations/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ a, b, operation })
            });

            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login';
                    return;
                }
                const err = await response.json().catch(() => ({}));
                showError(err.error ?? err.detail ?? 'Failed to update calculation');
                return;
            }

            document.getElementById('editModal').classList.add('hidden');
            showSuccess('Calculation updated successfully');
            loadCalculations();
        } catch (error) {
            showError('Error updating calculation');
        }
    });

    // Handle logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.clear();
            window.location.href = '/login';
        }
    });

    // Initial load of calculations
    loadCalculations();

    // Refresh calculations periodically (every 30 seconds)
    setInterval(loadCalculations, 30000);
});
</script>
{% endblock %}
